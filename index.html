<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdichtungsassistent · DIN 18533</title>
<style>
:root {
  --bg: #161820;
  --surface: #1e2029;
  --surface2: #272a36;
  --surface3: #2f3344;
  --border: #383d52;
  --accent: #e8a23a;
  --accent2: #4a9ef0;
  --ok: #3ac87a;
  --danger: #e8503a;
  --text: #eaecf4;
  --text2: #b0b8cc;
  --muted: #6a7490;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 20px 14px 60px;
}
header {
  width: 100%; max-width: 680px;
  display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
}
.logo {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #c87c20, #e8a23a);
  border-radius: 11px; display: grid; place-items: center;
  font-size: 22px; flex-shrink: 0; box-shadow: 0 2px 10px rgba(232,162,58,0.25);
}
.header-text h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; }
.header-text p  { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

.progress-wrap { width: 100%; max-width: 680px; margin-bottom: 14px; }
.progress-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill  { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.35s cubic-bezier(.4,0,.2,1); }
.progress-label { font-size: 0.7rem; color: var(--muted); margin-top: 6px; display: flex; justify-content: space-between; }

.breadcrumb { width: 100%; max-width: 680px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 16px; min-height: 26px; }
.crumb { font-size: 0.72rem; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 9px; white-space: nowrap; }
.crumb-arrow { color: var(--border); font-size: 0.7rem; }

.card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px 24px 22px; animation: slideUp 0.22s ease; }
@keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.step-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 12px; }
.step-dot  { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.question  { font-size: 1.1rem; font-weight: 600; line-height: 1.45; margin-bottom: 6px; }
.hint      { font-size: 0.82rem; color: var(--text2); line-height: 1.55; margin-bottom: 20px; }

.options { display: flex; flex-direction: column; gap: 8px; }
.opt-btn {
  background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 13px 16px; cursor: pointer; text-align: left; color: var(--text);
  font-family: var(--font); font-size: 0.9rem;
  transition: border-color 0.15s, background 0.15s, transform 0.12s;
  display: flex; align-items: center; gap: 13px; width: 100%;
}
.opt-btn:hover { border-color: var(--accent); background: var(--surface3); transform: translateX(3px); }
.opt-icon  { font-size: 1.2rem; width: 30px; text-align: center; flex-shrink: 0; }
.opt-label { font-weight: 600; font-size: 0.9rem; display: block; }
.opt-desc  { font-size: 0.76rem; color: var(--muted); display: block; margin-top: 2px; line-height: 1.4; }

.back-row { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
.back-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; color: var(--muted); font-family: var(--font); font-size: 0.8rem; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
.back-btn:hover { color: var(--text); border-color: var(--text2); }

/* ── Result layout ── */
.result-wrap { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 12px; animation: slideUp 0.25s ease; }
.result-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px 20px; }

.badge { display: inline-block; padding: 3px 11px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; }
.badge-low  { background: rgba(58,200,122,0.12); color: #4ed68a; border: 1px solid rgba(58,200,122,0.28); }
.badge-mid  { background: rgba(232,162,58,0.12); color: #f0b450; border: 1px solid rgba(232,162,58,0.28); }
.badge-high { background: rgba(232,80,58,0.12);  color: #f06050; border: 1px solid rgba(232,80,58,0.28); }

.result-title    { font-size: 1.2rem; font-weight: 700; line-height: 1.35; }
.result-subtitle { font-size: 0.82rem; color: var(--text2); margin-top: 5px; line-height: 1.5; }

.warn-list { display: flex; flex-direction: column; gap: 8px; }
.warn-box  { display: flex; gap: 10px; align-items: flex-start; background: rgba(232,80,58,0.08); border: 1px solid rgba(232,80,58,0.22); border-radius: 9px; padding: 11px 14px; font-size: 0.83rem; color: #f0a090; line-height: 1.5; }

.section-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.section-head  { padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); background: var(--surface2); }
.section-body  { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }

.sys-item { display: flex; gap: 12px; align-items: flex-start; padding: 12px 14px; background: var(--surface2); border-radius: 9px; border-left: 3px solid var(--border); }
.sys-item.prim { border-left-color: var(--ok); }
.sys-item.alt  { border-left-color: var(--accent2); }
.sys-tag  { font-size: 0.64rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
.sys-item.prim .sys-tag { background: rgba(58,200,122,0.14); color: #4ed68a; }
.sys-item.alt  .sys-tag { background: rgba(74,158,240,0.14); color: #70b8ff; }
.sys-name { font-weight: 600; font-size: 0.88rem; }
.sys-note { font-size: 0.76rem; color: var(--muted); margin-top: 2px; line-height: 1.4; }

.check-list  { display: flex; flex-direction: column; gap: 7px; }
.check-item  { display: flex; align-items: flex-start; gap: 10px; font-size: 0.85rem; color: var(--text2); line-height: 1.45; }
.check-box   { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 4px; flex-shrink: 0; margin-top: 2px; background: var(--surface3); cursor: pointer; transition: background 0.15s; display: grid; place-items: center; }
.check-box.checked { background: var(--ok); border-color: var(--ok); }
.check-box.checked::after { content: "✓"; color: #0a2018; font-size: 10px; font-weight: 900; }
.check-label         { cursor: pointer; }
.check-label.checked { color: var(--muted); text-decoration: line-through; }

.norm-row { display: flex; align-items: center; gap: 8px; font-size: 0.74rem; color: var(--muted); padding: 10px 18px; border-top: 1px solid var(--border); background: var(--surface2); }

/* ── StLB Ausschreibung ── */
.stlb-block { background: var(--surface); border: 1px solid rgba(74,158,240,0.35); border-radius: var(--radius); overflow: hidden; }
.stlb-head  {
  padding: 12px 18px; border-bottom: 1px solid rgba(74,158,240,0.2);
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  color: #70b8ff; background: rgba(74,158,240,0.07);
  display: flex; align-items: center; justify-content: space-between; cursor: pointer;
  user-select: none;
}
.stlb-head-left { display: flex; align-items: center; gap: 8px; }
.stlb-badge { background: rgba(74,158,240,0.18); color: #70b8ff; border: 1px solid rgba(74,158,240,0.3); border-radius: 20px; font-size: 0.66rem; font-weight: 700; padding: 2px 8px; letter-spacing: 0.05em; }
.stlb-toggle { font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; }
.stlb-toggle.open { transform: rotate(180deg); }
.stlb-body  { padding: 0; }

.stlb-pos {
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.stlb-pos:last-child { border-bottom: none; }

.stlb-pos-head {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 18px; cursor: pointer;
  transition: background 0.15s;
}
.stlb-pos-head:hover { background: var(--surface2); }

.stlb-nr {
  font-size: 0.7rem; font-weight: 700; color: var(--accent2);
  background: rgba(74,158,240,0.1); border-radius: 5px;
  padding: 2px 7px; white-space: nowrap; flex-shrink: 0; margin-top: 1px;
  font-family: 'Courier New', monospace;
}
.stlb-kurz { font-weight: 600; font-size: 0.88rem; flex: 1; line-height: 1.4; }
.stlb-arrow { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; margin-top: 3px; transition: transform 0.2s; }
.stlb-arrow.open { transform: rotate(90deg); }

.stlb-detail {
  display: none;
  padding: 0 18px 16px 18px;
  border-top: 1px dashed var(--border);
  background: rgba(74,158,240,0.03);
}
.stlb-detail.open { display: block; }

.stlb-langtext {
  font-size: 0.82rem; color: var(--text2); line-height: 1.65;
  white-space: pre-wrap; margin-top: 12px;
  font-family: 'Courier New', monospace;
  background: var(--surface2); border-radius: 8px;
  padding: 12px 14px; border: 1px solid var(--border);
}

.copy-btn {
  margin-top: 10px; background: none; border: 1px solid rgba(74,158,240,0.3);
  border-radius: 7px; padding: 6px 12px; color: #70b8ff;
  font-family: var(--font); font-size: 0.76rem; cursor: pointer;
  transition: background 0.15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.copy-btn:hover { background: rgba(74,158,240,0.1); }
.copy-btn.copied { color: var(--ok); border-color: rgba(58,200,122,0.3); }

.stlb-hidden { display: none; }

/* ── Footer buttons ── */
.result-footer { display: flex; gap: 10px; flex-wrap: wrap; }
.action-btn { background: none; border: 1px solid var(--border); border-radius: 9px; padding: 9px 16px; color: var(--text2); font-family: var(--font); font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
.action-btn:hover { color: var(--text); border-color: var(--text2); }
.action-btn.primary-btn { background: var(--accent); border-color: var(--accent); color: #1a0f00; font-weight: 700; }
.action-btn.primary-btn:hover { background: #f0b050; }

@media (max-width: 480px) {
  body { padding: 14px 10px 50px; }
  .card, .result-hero { padding: 20px 16px 18px; }
  .section-body { padding: 12px 14px; }
  .question { font-size: 1rem; }
  .stlb-langtext { font-size: 0.76rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🧱</div>
  <div class="header-text">
    <h1>Abdichtungsassistent</h1>
    <p>DIN 18533 · StLB-Bau Ausschreibung</p>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label"><span id="progressLabel">Schritt 1</span><span id="progressPct">0 %</span></div>
</div>
<div class="breadcrumb" id="breadcrumb"></div>
<div id="app"></div>

<script>
var navStack    = [];
var answers     = {};
var currentStep = "bauteil";

// ─── Entscheidungsbaum ────────────────────────────────────────────────────────
var TREE = {
  bauteil: {
    step:"Schritt 1 · Bauteil", progress:20,
    question:"Was soll abgedichtet werden?",
    hint:"Wähle das betroffene Bauteil oder den Anschlusstyp.",
    options:[
      {icon:"🧱",label:"Wand (erdberührt, außen)",     desc:"Kellerw., UG-Außenwand gegen Erdreich",           key:"bauteil",ans:"wand",          next:"wasser"},
      {icon:"⬜",label:"Bodenplatte / Sohle",           desc:"Unterste Betonplatte, ggf. druckbelastet",        key:"bauteil",ans:"sohle",         next:"wasser"},
      {icon:"🏗",label:"TG-Decke / Außendecke",         desc:"Tiefgaragendecke, Flachdach, Parkdeck",           key:"bauteil",ans:"tg",            next:"tg_nutzung"},
      {icon:"📐",label:"Sockel / Spritzwasserzone",     desc:"Übergang Wand zu Gelände, bis 30 cm ü. GOK",      key:"bauteil",ans:"sockel",        next:"sockel_typ"},
      {icon:"🔩",label:"Durchdringung / Anschluss",     desc:"Rohr, Fenster/Tür, Wand-Boden-Übergang",         key:"bauteil",ans:"durchdringung", next:"dg_typ"},
    ]
  },
  wasser: {
    step:"Schritt 2 · Wassereinwirkung", progress:50,
    question:"Welche Wassereinwirkungsklasse liegt vor?",
    hint:"Entnimm das Baugrundgutachten oder die GW-Karte. Unsicher? → letzte Option.",
    options:[
      {icon:"💧",label:"W1.1-E – Bodenfeuchte",                   desc:"Kapillarwasser, kein Druckwasser; durchlässiger Boden",          key:"wasser",ans:"W1.1-E",next:"result"},
      {icon:"💧",label:"W1.2-E – Nicht stauendes Sickerwasser",   desc:"Zeitweise Wasseransammlung, kein Dauerdruck",                    key:"wasser",ans:"W1.2-E",next:"result"},
      {icon:"🌊",label:"W2.1-E – Drückendes Wasser ≤ 3 m",        desc:"Grundwasser/Stauspiegel, Druckhöhe bis 3 m",                    key:"wasser",ans:"W2.1-E",next:"result"},
      {icon:"🌊",label:"W2.2-E – Drückendes Wasser > 3 m",        desc:"Hoher Grundwasserdruck, Druckhöhe über 3 m",                    key:"wasser",ans:"W2.2-E",next:"result"},
      {icon:"❓",label:"Ich weiß es nicht – Leitfragen",          desc:"Anhand von 2 Fragen wird die Klasse ermittelt",                  key:"wasser",ans:null,    next:"leitfrage1"},
    ]
  },
  leitfrage1: {
    step:"Schritt 2b · Leitfrage", progress:55,
    question:"Ist Grundwasser bekannt oder war Wasser im Aushub sichtbar?",
    hint:"Grundwasserspiegel laut Gutachten, oder war die Baugrube nass?",
    options:[
      {icon:"✅",label:"Nein – kein Grundwasser, Boden trocken",  desc:"Boden sandig/kiesig, kein Wasserandrang",   key:"gw",ans:"nein",next:"leitfrage2a"},
      {icon:"⚠",label:"Ja / Unsicher – Grundwasser vorhanden",   desc:"Nasser Aushub oder Grundwasserspiegel",      key:"gw",ans:"ja",  next:"leitfrage2b"},
    ]
  },
  leitfrage2a: {
    step:"Schritt 2b · Leitfrage", progress:60,
    question:"Staut sich nach Starkregen Wasser am Bauwerk?",
    hint:"Lehmiger oder bindiger Boden? Kein Gefälle zur Drainage?",
    options:[
      {icon:"✅",label:"Nein – Wasser versickert schnell",   desc:"Kies/Sand, Drainage vorhanden",          key:"wasser",ans:"W1.1-E",next:"result"},
      {icon:"⚠",label:"Ja – Wasser staut sich kurzzeitig", desc:"Lehm/Ton, schlechte Versickerung",        key:"wasser",ans:"W1.2-E",next:"result"},
    ]
  },
  leitfrage2b: {
    step:"Schritt 2b · Leitfrage", progress:60,
    question:"Wie hoch steht der Grundwasserspiegel unter GOK?",
    hint:"Maßgeblich für den Wasserdruck auf die Konstruktion.",
    options:[
      {icon:"📏",label:"Weniger als 3 m unter GOK",  desc:"GW-Spiegel bei UK-Bodenplatte oder knapp darunter",  key:"wasser",ans:"W2.1-E",next:"result"},
      {icon:"📏",label:"3 m oder tiefer unter GOK", desc:"Tiefes GW, Druckhöhe über 3 m",                       key:"wasser",ans:"W2.2-E",next:"result"},
    ]
  },
  tg_nutzung: {
    step:"Schritt 2 · TG-Decke / Nutzung", progress:50,
    question:"Wie wird die TG-Decke / Außendecke genutzt?",
    hint:"Die Nutzung bestimmt Lastklasse, Schichtaufbau und zugelassenes System.",
    options:[
      {icon:"🌿",label:"Begrünt / Erdüberdeckt",  desc:"Extensive oder intensive Dachbegrünung",   key:"nutzung",ans:"gruen",next:"result"},
      {icon:"🚗",label:"Befahren (PKW / LKW)",    desc:"Parkdeck, Zufahrt, Tiefgaragendecke",      key:"nutzung",ans:"fahr", next:"din18532_waerme"},
      {icon:"🚶",label:"Begangen (Fußgänger)",    desc:"Dachterrasse, begehbare Fläche",           key:"nutzung",ans:"geh",  next:"result"},
    ]
  },
  sockel_typ: {
    step:"Schritt 2 · Sockelzone", progress:50,
    question:"Wie ist die Sockelzone ausgebildet?",
    hint:"Abdichtung muss mindestens 30 cm über GOK hochgezogen werden.",
    options:[
      {icon:"📏",label:"Nur Spritzwasserzone (unter 30 cm ü. GOK)", desc:"Putzabschluss, Fassadenunterkante",                      key:"sockel",ans:"kurz", next:"result"},
      {icon:"🔗",label:"Kombi: Sockel + erdberührte Wand",           desc:"Abdichtung zieht von der Wand in die Sockelzone durch",  key:"sockel",ans:"kombi",next:"result"},
    ]
  },
  dg_typ: {
    step:"Schritt 2 · Durchdringungstyp", progress:50,
    question:"Um welchen Typ von Durchdringung handelt es sich?",
    options:[
      {icon:"🔧",label:"Rohr / Leerrohr (rund)",    desc:"Ver- und Entsorgungsleitungen durch Wand oder Sohle",   key:"dg",ans:"rohr",      next:"result"},
      {icon:"🚪",label:"Tür- / Fensteranschluss",   desc:"Blendrahmen an Abdichtungsebene anschließen",           key:"dg",ans:"tuer",      next:"result"},
      {icon:"📐",label:"Wand-Boden-Anschluss",      desc:"Übergang Bodenplatte zu aufgehender Wand / Hohlkehle",  key:"dg",ans:"anschluss", next:"result"},
    ]
  },
};

// ── DIN 18532 Zusatzschritte (befahrene Flächen) ──
Object.assign(TREE, {
  din18532_waerme: {
    step:"Schritt 3 · DIN 18532 – Wärmedämmung", progress:65,
    question:"Ist eine Wärmedämmung im Aufbau vorgesehen?",
    hint:"Umkehrdach oder Warmdach-Aufbau? Beeinflusst die zulässigen Systemvarianten nach DIN 18532.",
    options:[
      {icon:"🌡",label:"Ja – Wärmedämmung vorhanden",     desc:"Umkehrdach, Warmdach, Dämmung auf oder unter Abdichtung",  key:"waerme",ans:"ja",   next:"din18532_geo"},
      {icon:"❄",label:"Nein – kein Wärmedämmaufbau",      desc:"Unbeheizte TG-Decke, Hofkellerdecke ohne Dämmung",         key:"waerme",ans:"nein", next:"din18532_geo"},
    ]
  },
  din18532_geo: {
    step:"Schritt 4 · DIN 18532 – Geometrie / Randbedingungen", progress:72,
    question:"Welche besonderen Randbedingungen liegen vor?",
    hint:"Mehrere Antworten möglich – wähle die am stärksten zutreffende.",
    options:[
      {icon:"📐",label:"Komplexe Geometrie / viele Durchdringungen", desc:"Rampen, Spindeln, viele Abläufe und Anschlüsse",          key:"geo",ans:"komplex",  next:"din18532_direkt"},
      {icon:"📏",label:"Geringe Aufbauhöhe erforderlich",             desc:"Wenig Platz für Systemaufbau, Übergänge zu Bodenbelägen", key:"geo",ans:"flach",    next:"din18532_direkt"},
      {icon:"🔲",label:"Einfache Fläche, Standard-Geometrie",         desc:"Regelmäßige Parkdeckfläche, wenige Anschlüsse",           key:"geo",ans:"standard", next:"din18532_system"},
    ]
  },
  din18532_direkt: {
    step:"Schritt 4b · DIN 18532 – Direkte Befahrung", progress:78,
    question:"Wird die Abdichtung direkt befahren (ohne Belag)?",
    hint:"Direkt befahrene Abdichtungen erfordern zwingend DIN 18532-6 (FLK/OS-System).",
    options:[
      {icon:"🚗",label:"Ja – Abdichtung direkt befahren",    desc:"Kein Betonbelag, Abdichtung ist Nutzschicht",    key:"direkt",ans:"ja",   next:"result"},
      {icon:"🧱",label:"Nein – Belag auf Abdichtung",         desc:"Betonbelag, Asphalt oder Gussasphalt darüber",   key:"direkt",ans:"nein", next:"din18532_system"},
    ]
  },
  din18532_system: {
    step:"Schritt 5 · DIN 18532 – Systemwunsch", progress:85,
    question:"Welches Abdichtungssystem ist bevorzugt?",
    hint:"Alle drei Systeme sind nach DIN 18532 für befahrene Flächen zugelassen.",
    options:[
      {icon:"🟦",label:"Kunststoff-/Elastomerbahn (DIN 18532-4)",           desc:"ECB, PVC-P, PIB, EPDM, FPO – 1 Lage Kunststoffbahn",         key:"system18532",ans:"18532-4", next:"result"},
      {icon:"🟫",label:"Bitumen + Kunststoffbahn (DIN 18532-5)",            desc:"Verbundsystem: Polymerbitumenbahn + Kunststoffbahn",           key:"system18532",ans:"18532-5", next:"result"},
      {icon:"🟨",label:"Flüssigkunststoff FLK / OS-System (DIN 18532-6)",   desc:"PMMA, PU, OS10/11a/11b – nahtlos, komplex anwendbar",         key:"system18532",ans:"18532-6", next:"result"},
    ]
  },
});

// ─── StLB-Texte ───────────────────────────────────────────────────────────────
// Orientiert an StLB-Bau Leistungsbereich 014 (Abdichtungsarbeiten)
// und LB 016 (Dachabdichtungsarbeiten). Texte sind Musterformulierungen.
var STLB = {

  "wand|W1.1-E": [
    {
      nr: "014.110",
      kurz: "Bitumendickanstrich / PMBC – Kelleraußenwand, W1.1-E",
      lang:
"Pos. 014.110\n" +
"Bitumendickbeschichtung (PMBC) auf Kelleraußenwand\n" +
"Wassereinwirkungsklasse W1.1-E nach DIN 18533\n\n" +

// ─── Navigation ───────────────────────────────────────────────────────────────
function chooseOption(idx) {
  var step = TREE[currentStep];
  var opt  = step.options[idx];
  if (opt.key && opt.ans !== undefined && opt.ans !== null) {
    answers[opt.key] = opt.ans;
  }
  navStack.push({ stepKey: currentStep, answers: JSON.parse(JSON.stringify(answers)), crumb: opt.label });
  currentStep = opt.next;
  render();
}

function goBack() {
  if (navStack.length === 0) return;
  var prev = navStack.pop();
  currentStep = prev.stepKey;
  answers     = prev.answers;
  render();
}

function resetAll() {
  navStack = []; answers = {}; currentStep = "bauteil";
  render();
}

function toggleCheck(i) {
  var box = document.getElementById("cb" + i);
  var lbl = document.getElementById("cl" + i);
  var on  = box.classList.toggle("checked");
  if (on) lbl.classList.add("checked"); else lbl.classList.remove("checked");
}

function toggleStlb() {
  var body   = document.getElementById("stlbBody");
  var toggle = document.getElementById("stlbToggle");
  var isOpen = body.style.display !== "none";
  body.style.display   = isOpen ? "none" : "block";
  toggle.textContent   = isOpen ? "▼ Anzeigen" : "▲ Ausblenden";
  toggle.classList.toggle("open", !isOpen);
}

function togglePos(i) {
  var detail = document.getElementById("stlbDetail" + i);
  var arrow  = document.getElementById("stlbArrow"  + i);
  var isOpen = detail.classList.contains("open");
  detail.classList.toggle("open",  !isOpen);
  arrow.classList.toggle("open",   !isOpen);
}

function copyText(i) {
  var ta  = document.getElementById("stlbText" + i);
  var btn = document.getElementById("copyBtn"  + i);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(ta.textContent).then(function() {
      btn.textContent = "✓ Kopiert!";
      btn.classList.add("copied");
      setTimeout(function() { btn.textContent = "📋 Text kopieren"; btn.classList.remove("copied"); }, 2000);
    });
  } else {
    var sel = window.getSelection();
    var range = document.createRange();
    range.selectNodeContents(ta);
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand("copy");
    sel.removeAllRanges();
    btn.textContent = "✓ Kopiert!";
    btn.classList.add("copied");
    setTimeout(function() { btn.textContent = "📋 Text kopieren"; btn.classList.remove("copied"); }, 2000);
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function setProgress(pct, label) {
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = label;
  document.getElementById("progressPct").textContent   = pct + " %";
}

function renderBreadcrumb() {
  var out = "";
  for (var i = 0; i < navStack.length; i++) {
    out += '<span class="crumb">' + navStack[i].crumb + '</span>';
    if (i < navStack.length - 1) out += '<span class="crumb-arrow">›</span>';
  }
  document.getElementById("breadcrumb").innerHTML = out;
}

function render() {
  renderBreadcrumb();
  if (currentStep === "result") { renderResult(); return; }
  var step = TREE[currentStep];
  if (!step) return;

  setProgress(step.progress, step.step);
  var opts = "";
  for (var i = 0; i < step.options.length; i++) {
    var o = step.options[i];
    opts += '<button class="opt-btn" onclick="chooseOption(' + i + ')">' +
      '<span class="opt-icon">' + o.icon + '</span>' +
      '<span class="opt-text"><span class="opt-label">' + o.label + '</span>' +
      (o.desc ? '<span class="opt-desc">' + o.desc + '</span>' : '') +
      '</span></button>';
  }
  var back = navStack.length > 0 ? '<div class="back-row"><button class="back-btn" onclick="goBack()">← Zurück</button></div>' : '';

  document.getElementById("app").innerHTML =
    '<div class="card">' +
      '<div class="step-chip"><span class="step-dot"></span>' + step.step + '</div>' +
      '<div class="question">' + step.question + '</div>' +
      (step.hint ? '<div class="hint">' + step.hint + '</div>' : '<div style="margin-bottom:16px"></div>') +
      '<div class="options">' + opts + '</div>' + back +
    '</div>';
}

        {prim:true, name:"FLK OS 11b – befahrbar (PKW/LKW)",                note:"PMMA oder PU, DIN 18532-6:2025-06, Nutzungsklassen N1-V bis N3-V"},
        {prim:false,name:"FLK OS 11a – leicht befahrbar",                    note:"Für N1-V, geringere Schichtdicke, gelegentliche Befahrung"},
        {prim:false,name:"FLK OS 10 – Fußgänger + leicht",                   note:"Nur N1-V, präzisiert in 2025-06"},
      ],
      checks:["Nutzungsklasse N1-V / N2-V / N3-V festlegen","Systemvariante wählen: OS 10 / OS 11a / OS 11b","Rissklasse R1-V – Untergrund prüfen, Risse verpressen","Rautiefenausgleich nach DIN 18532-6:2025-06 herstellen","Schichtdicken je Lage protokollieren (Nassfilm)","Dehnfugen und Abläufe nahtlos integrieren","Aushärtungsprotokoll und Freigabe Hersteller","OS 8 ist gestrichen (Stand 2025) – nicht mehr verwenden!"],
      warnungen:["DIN 18532-6:2025-06: OS 8 gestrichen – bestehende Ausschreibungen prüfen!","Komplexe Geometrien: Systemherstellerfreigabe für alle Anschlussdetails einholen."],
      norm:"DIN 18532-6:2025-06 (abwärtskompatibel zu 2017-07)"},
  };

  var r = RESULTS[key];
  if (!r) {
    document.getElementById("app").innerHTML =
      '<div class="card"><p style="color:var(--muted)">Kombination nicht erkannt (Key: ' + key + ').</p>' +
      '<div class="back-row"><button class="back-btn" onclick="goBack()">← Zurück</button></div></div>';
    return;
  }

  // Warns
  var warns = "";
  for (var i = 0; i < r.warnungen.length; i++) {
    warns += '<div class="warn-box"><span>⚠️</span><span>' + r.warnungen[i] + '</span></div>';
  }
  if (warns) warns = '<div class="warn-list">' + warns + '</div>';

  // Systems
  var sys = "";
  for (var i = 0; i < r.systeme.length; i++) {
    var s = r.systeme[i];
    sys += '<div class="sys-item ' + (s.prim ? "prim" : "alt") + '">' +
      '<span class="sys-tag">' + (s.prim ? "Empfohlen" : "Alternativ") + '</span>' +
      '<div><div class="sys-name">' + s.name + '</div><div class="sys-note">' + s.note + '</div></div></div>';
  }

  // Checks
  var chk = "";
  for (var i = 0; i < r.checks.length; i++) {
    chk += '<div class="check-item">' +
      '<div class="check-box" id="cb' + i + '" onclick="toggleCheck(' + i + ')"></div>' +
      '<span class="check-label" id="cl' + i + '" onclick="toggleCheck(' + i + ')">' + r.checks[i] + '</span></div>';
  }

  // StLB positions
  var stlbPositionen = STLB[key] || [];
  var stlbHtml = "";
  if (stlbPositionen.length > 0) {
    var posHtml = "";
    for (var i = 0; i < stlbPositionen.length; i++) {
      var p = stlbPositionen[i];
      posHtml +=
        '<div class="stlb-pos">' +
          '<div class="stlb-pos-head" onclick="togglePos(' + i + ')">' +
            '<span class="stlb-nr">' + p.nr + '</span>' +
            '<span class="stlb-kurz">' + p.kurz + '</span>' +
            '<span class="stlb-arrow" id="stlbArrow' + i + '">›</span>' +
          '</div>' +
          '<div class="stlb-detail" id="stlbDetail' + i + '">' +
            '<pre class="stlb-langtext" id="stlbText' + i + '">' + p.lang + '</pre>' +
            '<button class="copy-btn" id="copyBtn' + i + '" onclick="copyText(' + i + ')">📋 Text kopieren</button>' +
          '</div>' +
        '</div>';
    }

    stlbHtml =
      '<div class="stlb-block">' +
        '<div class="stlb-head" onclick="toggleStlb()">' +
          '<div class="stlb-head-left">' +
            '<span>📄 Ausschreibungstext</span>' +
            '<span class="stlb-badge">StLB-Bau orientiert</span>' +
          '</div>' +
          '<span class="stlb-toggle" id="stlbToggle">▼ Anzeigen</span>' +
        '</div>' +
        '<div class="stlb-body" id="stlbBody" style="display:none">' +
          posHtml +
        '</div>' +
      '</div>';
  }

  document.getElementById("app").innerHTML =
    '<div class="result-wrap">' +
      '<div class="result-hero">' +
        '<div class="badge ' + r.badge + '">' + r.klasse + '</div>' +
        '<div class="result-title">' + r.title + '</div>' +
        '<div class="result-subtitle">' + r.subtitle + '</div>' +
      '</div>' +
      warns +
      '<div class="section-block">' +
        '<div class="section-head">Abdichtungssystem</div>' +
        '<div class="section-body">' + sys + '</div>' +
      '</div>' +
      '<div class="section-block">' +
        '<div class="section-head">Ausführungs-Checkliste (Bauleiter)</div>' +
        '<div class="section-body check-list">' + chk + '</div>' +
        '<div class="norm-row"><span>📖</span>' + r.norm + '</div>' +
      '</div>' +
      stlbHtml +
      '<div class="result-footer">' +
        '<button class="back-btn" onclick="goBack()">← Zurück</button>' +
        '<button class="action-btn primary-btn" onclick="resetAll()">↩ Neue Abfrage</button>' +
      '</div>' +
    '</div>';
}

render();
</script>
</body>
</html>
