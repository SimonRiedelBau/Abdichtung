<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdichtungsassistent · DIN 18533</title>
<style>
:root {
  --bg: #161820;
  --surface: #1e2029;
  --surface2: #272a36;
  --surface3: #2f3344;
  --border: #383d52;
  --accent: #e8a23a;
  --accent2: #4a9ef0;
  --ok: #3ac87a;
  --warn: #e8a23a;
  --danger: #e8503a;
  --text: #eaecf4;
  --text2: #b0b8cc;
  --muted: #6a7490;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --radius: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 14px 60px;
}

/* ── Header ── */
header {
  width: 100%;
  max-width: 660px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}

.logo {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #c87c20, #e8a23a);
  border-radius: 11px;
  display: grid; place-items: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 2px 10px rgba(232,162,58,0.25);
}

.header-text h1 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.header-text p {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 2px;
}

/* ── Progress ── */
.progress-wrap {
  width: 100%;
  max-width: 660px;
  margin-bottom: 14px;
}

.progress-track {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.35s cubic-bezier(.4,0,.2,1);
}

.progress-label {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 6px;
  display: flex;
  justify-content: space-between;
}

/* ── Breadcrumb ── */
.breadcrumb {
  width: 100%;
  max-width: 660px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  margin-bottom: 16px;
  min-height: 26px;
}

.crumb {
  font-size: 0.72rem;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 9px;
  white-space: nowrap;
}

.crumb-arrow {
  color: var(--border);
  font-size: 0.7rem;
}

/* ── Card ── */
.card {
  width: 100%;
  max-width: 660px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px 24px 22px;
  animation: slideUp 0.22s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.step-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 12px;
}

.step-dot {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
}

.question {
  font-size: 1.1rem;
  font-weight: 600;
  line-height: 1.45;
  color: var(--text);
  margin-bottom: 6px;
}

.hint {
  font-size: 0.82rem;
  color: var(--text2);
  line-height: 1.55;
  margin-bottom: 20px;
}

/* ── Options ── */
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.opt-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  cursor: pointer;
  text-align: left;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.9rem;
  transition: border-color 0.15s, background 0.15s, transform 0.12s;
  display: flex;
  align-items: center;
  gap: 13px;
  width: 100%;
}

.opt-btn:hover {
  border-color: var(--accent);
  background: var(--surface3);
  transform: translateX(3px);
}

.opt-btn:active {
  transform: translateX(3px) scale(0.99);
}

.opt-icon {
  font-size: 1.2rem;
  width: 30px;
  text-align: center;
  flex-shrink: 0;
}

.opt-text .opt-label {
  font-weight: 600;
  font-size: 0.9rem;
  display: block;
}

.opt-text .opt-desc {
  font-size: 0.76rem;
  color: var(--muted);
  display: block;
  margin-top: 2px;
  line-height: 1.4;
}

/* ── Back button ── */
.back-row {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.back-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  color: var(--muted);
  font-family: var(--font);
  font-size: 0.8rem;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.back-btn:hover {
  color: var(--text);
  border-color: var(--text2);
}

/* ── Result ── */
.result-wrap {
  width: 100%;
  max-width: 660px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  animation: slideUp 0.25s ease;
}

.result-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px 20px;
}

.badge {
  display: inline-block;
  padding: 3px 11px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.badge-low  { background: rgba(58,200,122,0.12); color: #4ed68a; border: 1px solid rgba(58,200,122,0.28); }
.badge-mid  { background: rgba(232,162,58,0.12); color: #f0b450; border: 1px solid rgba(232,162,58,0.28); }
.badge-high { background: rgba(232,80,58,0.12);  color: #f06050; border: 1px solid rgba(232,80,58,0.28); }

.result-title {
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.35;
  color: var(--text);
}

.result-subtitle {
  font-size: 0.82rem;
  color: var(--text2);
  margin-top: 5px;
  line-height: 1.5;
}

/* ── Warn boxes ── */
.warn-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.warn-box {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  background: rgba(232,80,58,0.08);
  border: 1px solid rgba(232,80,58,0.22);
  border-radius: 9px;
  padding: 11px 14px;
  font-size: 0.83rem;
  color: #f0a090;
  line-height: 1.5;
}

.warn-box .wi { flex-shrink: 0; font-size: 1rem; }

/* ── Section block ── */
.section-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.section-head {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  background: var(--surface2);
}

.section-body {
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── System items ── */
.sys-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 12px 14px;
  background: var(--surface2);
  border-radius: 9px;
  border-left: 3px solid var(--border);
}

.sys-item.prim { border-left-color: var(--ok); }
.sys-item.alt  { border-left-color: var(--accent2); }

.sys-tag {
  font-size: 0.64rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}

.sys-item.prim .sys-tag { background: rgba(58,200,122,0.14); color: #4ed68a; }
.sys-item.alt  .sys-tag { background: rgba(74,158,240,0.14); color: #70b8ff; }

.sys-name { font-weight: 600; font-size: 0.88rem; }
.sys-note { font-size: 0.76rem; color: var(--muted); margin-top: 2px; line-height: 1.4; }

/* ── Checklist ── */
.check-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.check-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 0.85rem;
  color: var(--text2);
  line-height: 1.45;
}

.check-box {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  background: var(--surface3);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  display: grid; place-items: center;
}

.check-box.checked {
  background: var(--ok);
  border-color: var(--ok);
}

.check-box.checked::after {
  content: "✓";
  color: #0a2018;
  font-size: 10px;
  font-weight: 900;
}

.check-label { cursor: pointer; }
.check-label.checked { color: var(--muted); text-decoration: line-through; }

/* ── Norm footer ── */
.norm-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.74rem;
  color: var(--muted);
  padding: 10px 18px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

.norm-icon { font-size: 0.9rem; }

/* ── Result footer ── */
.result-footer {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.action-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 9px 16px;
  color: var(--text2);
  font-family: var(--font);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
}

.action-btn:hover { color: var(--text); border-color: var(--text2); }

.action-btn.primary-btn {
  background: var(--accent);
  border-color: var(--accent);
  color: #1a0f00;
  font-weight: 700;
}

.action-btn.primary-btn:hover {
  background: #f0b050;
  border-color: #f0b050;
}

/* Mobile */
@media (max-width: 480px) {
  body { padding: 14px 10px 50px; }
  .card { padding: 20px 16px 18px; }
  .result-hero { padding: 18px 16px; }
  .section-body { padding: 12px 14px; }
  .question { font-size: 1rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🧱</div>
  <div class="header-text">
    <h1>Abdichtungsassistent</h1>
    <p>DIN 18533 · Systemwahl per Klick</p>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label">
    <span id="progressLabel">Schritt 1 von 3</span>
    <span id="progressPct">0 %</span>
  </div>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// STATE — stack-based navigation: each entry = { stepKey, stateSnapshot, crumbLabel }
// ═══════════════════════════════════════════════════════════════════════════════
let navStack = [];   // history of visited steps + state
let answers  = {};   // current collected answers

// ═══════════════════════════════════════════════════════════════════════════════
// DECISION TREE
// ═══════════════════════════════════════════════════════════════════════════════
const TREE = {

  // ── Step 1: Bauteil ──────────────────────────────────────────────────────
  bauteil: {
    step: "Schritt 1 · Bauteil",
    question: "Was soll abgedichtet werden?",
    hint: "Wähle das betroffene Bauteil oder den Anschlusstyp.",
    progress: 20,
    options: [
      { icon:"🧱", label:"Wand (erdberührt, außen)",       desc:"Kellerw., UG-Außenwand gegen Erdreich",           ans:"wand",          next:"wasser" },
      { icon:"⬜", label:"Bodenplatte / Sohle",             desc:"Unterste Betonplatte, ggf. druckbelastet",        ans:"sohle",         next:"wasser" },
      { icon:"🏗️", label:"TG-Decke / Außendecke",          desc:"Tiefgaragendecke, Flachdach, Parkdeck",           ans:"tg",            next:"tg_nutzung" },
      { icon:"📐", label:"Sockel / Spritzwasserzone",       desc:"Übergang Wand ↔ Gelände, ≤ 30 cm ü. GOK",        ans:"sockel",        next:"sockel_typ" },
      { icon:"🔩", label:"Durchdringung / Anschluss",       desc:"Rohr, Fenster/Tür, Wand-Boden-Übergang",         ans:"durchdringung", next:"dg_typ" },
    ]
  },

  // ── Step 2a: Wassereinwirkung (Wand & Sohle) ─────────────────────────────
  wasser: {
    step: "Schritt 2 · Wassereinwirkung",
    question: "Welche Wassereinwirkungsklasse liegt vor?",
    hint: "Entnimm das Baugrundgutachten oder die GW-Karte. Unsicher? → letzte Option.",
    progress: 50,
    options: [
      { icon:"💧",   label:"W1.1-E – Bodenfeuchte",                   desc:"Kapillarwasser, kein Druckwasser; durchlässiger Boden",                   ans:"W1.1-E", next:"result" },
      { icon:"💧💧",  label:"W1.2-E – Nicht stauendes Sickerwasser",   desc:"Zeitweise Wasseransammlung, kein Dauerdruck; mäßig durchlässig",         ans:"W1.2-E", next:"result" },
      { icon:"🌊",   label:"W2.1-E – Drückendes Wasser ≤ 3 m",        desc:"Grundwasser/Stauspiegel, Druckhöhe bis 3 m",                             ans:"W2.1-E", next:"result" },
      { icon:"🌊🌊", label:"W2.2-E – Drückendes Wasser > 3 m",        desc:"Hoher Grundwasserdruck, Druckhöhe > 3 m",                                ans:"W2.2-E", next:"result" },
      { icon:"❓",   label:"Ich weiß es nicht – Leitfragen anzeigen", desc:"Anhand von 2 Fragen wird die Klasse ermittelt",                          ans:null,     next:"wasser_leitfrage1" },
    ]
  },

  // ── Leitfragen Wasserklasse ───────────────────────────────────────────────
  wasser_leitfrage1: {
    step: "Schritt 2b · Leitfrage",
    question: "Ist Grundwasser bekannt oder war Wasser im Aushub sichtbar?",
    hint: "Grundwasserspiegel laut Gutachten, oder war die Baugrube nass?",
    progress: 55,
    options: [
      { icon:"✅", label:"Nein – kein Grundwasser, Boden trocken",   desc:"Boden sandig/kiesig, kein Wasserandrang im Aushub",  ans:"nein", next:"wasser_leitfrage2a" },
      { icon:"⚠️", label:"Ja / Unsicher – Grundwasser vorhanden",   desc:"Nasser Aushub, Grundwasserspiegel bekannt",           ans:"ja",   next:"wasser_leitfrage2b" },
    ]
  },

  wasser_leitfrage2a: {
    step: "Schritt 2b · Leitfrage",
    question: "Staut sich nach Starkregen oder Schneeschmelze Wasser am Bauwerk?",
    hint: "Lehmiger oder bindig-toniger Boden? Kein Gefälle zur Drainage?",
    progress: 60,
    options: [
      { icon:"✅", label:"Nein – Wasser versickert schnell",    desc:"Kies/Sand, Drainage vorhanden oder nicht nötig",  ans:"W1.1-E", next:"result" },
      { icon:"⚠️", label:"Ja – Wasser staut sich kurzzeitig",  desc:"Lehm/Ton, schlechte Versickerung, kein Gefälle",  ans:"W1.2-E", next:"result" },
    ]
  },

  wasser_leitfrage2b: {
    step: "Schritt 2b · Leitfrage",
    question: "Wie hoch steht der Grundwasserspiegel unter Gelände (GOK)?",
    hint: "Maßgeblich für den Wasserdruck auf die Konstruktion.",
    progress: 60,
    options: [
      { icon:"📏", label:"Grundwasser < 3 m unter GOK",  desc:"z. B. GW-Spiegel bei UK-Bodenplatte oder knapp darunter",  ans:"W2.1-E", next:"result" },
      { icon:"📏", label:"Grundwasser ≥ 3 m unter GOK", desc:"Tiefes GW, Druckhöhe über 3 m",                              ans:"W2.2-E", next:"result" },
    ]
  },

  // ── Step 2b: TG-Decke Nutzung ─────────────────────────────────────────────
  tg_nutzung: {
    step: "Schritt 2 · TG-Decke / Nutzung",
    question: "Wie wird die TG-Decke / Außendecke genutzt?",
    hint: "Die Nutzung bestimmt Lastklasse, Schichtaufbau und zugelassenes System.",
    progress: 50,
    options: [
      { icon:"🌿", label:"Begrünt / Erdüberdeckt",   desc:"Extensive oder intensive Dachbegrünung, Erddach",         ans:"gruen",  next:"result" },
      { icon:"🚗", label:"Befahren (PKW / LKW)",      desc:"Parkdeck, Zufahrt, Tiefgaragendecke",                     ans:"fahr",   next:"result" },
      { icon:"🚶", label:"Begangen (Fußgänger)",      desc:"Dachterrasse, begehbare Fläche",                          ans:"geh",    next:"result" },
    ]
  },

  // ── Step 2c: Sockel ───────────────────────────────────────────────────────
  sockel_typ: {
    step: "Schritt 2 · Sockelzone",
    question: "Wie ist die Sockelzone ausgebildet?",
    hint: "Abdichtung muss mindestens 30 cm über GOK hochgezogen werden.",
    progress: 50,
    options: [
      { icon:"📏", label:"Nur Spritzwasserzone (< 30 cm ü. GOK)", desc:"Putzabschluss, Fassadenunterkante",                             ans:"kurz",  next:"result" },
      { icon:"🔗", label:"Kombi: Sockel + erdberührte Wand",       desc:"Abdichtung zieht von der Wand in die Sockelzone durch",         ans:"kombi", next:"result" },
    ]
  },

  // ── Step 2d: Durchdringung ────────────────────────────────────────────────
  dg_typ: {
    step: "Schritt 2 · Durchdringungstyp",
    question: "Um welchen Typ von Durchdringung / Anschluss handelt es sich?",
    progress: 50,
    options: [
      { icon:"🔧", label:"Rohr / Leerrohr (rund)",     desc:"Ver- und Entsorgungsleitungen durch Wand oder Sohle",   ans:"rohr",      next:"result" },
      { icon:"🚪", label:"Tür- / Fensteranschluss",    desc:"Blendrahmen an Abdichtungsebene anschließen",           ans:"tuer",      next:"result" },
      { icon:"📐", label:"Wand-Boden-Anschluss",       desc:"Übergang Bodenplatte ↔ aufgehende Wand / Hohlkehle",   ans:"anschluss", next:"result" },
    ]
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// RESULTS DATABASE
// ═══════════════════════════════════════════════════════════════════════════════
function getResult(ans) {
  const b = ans.bauteil;
  const w = ans.wasser || ans.wasser_leitfrage2a || ans.wasser_leitfrage2b;
  const tg = ans.tg_nutzung;
  const sk = ans.sockel_typ;
  const dg = ans.dg_typ;

  // ── Wand ──────────────────────────────────────────────────────────────────
  if (b === "wand" && w === "W1.1-E") return {
    klasse: "W1.1-E", badge: "badge-low",
    title: "Wand erdberührt · Bodenfeuchte",
    subtitle: "Kein Druckwasser, kapillarfeuchter Boden. Geringe Anforderung.",
    systeme: [
      { prim:true,  name:"PMBC – Polymer-Bitumen-Dickbeschichtung",  note:"mind. 4 mm Trockenfilmdicke, 2 Lagen kreuzweise, DIN 18533-2 §4.2" },
      { prim:false, name:"MDS – Mineralische Dichtungsschlämme",     note:"Bei mineralischen Untergründen (Mauerwerk, Beton)" },
    ],
    checks:[
      "Untergrund sauber, trocken und tragfähig",
      "Voranstrich (Primer) lt. Herstellervorgabe auftragen",
      "Mindestens 2 Lagen kreuzweise aufbringen",
      "Schichtdicke ≥ 4 mm gesamt messen (Nassauftrag prüfen)",
      "Kein Auftrag bei Frost, Regen oder > 30 °C",
      "Noppenbahn / Drainagefolie als Schutzschicht",
    ],
    warnungen:[],
    norm:"DIN 18533-2:2017, Tab.1, W1.1-E · DIN 18533-1 §4.3",
  };

  if (b === "wand" && w === "W1.2-E") return {
    klasse: "W1.2-E", badge: "badge-low",
    title: "Wand erdberührt · Sickerwasser",
    subtitle: "Zeitweise Wasseransammlung, kein Dauerdruck. Mittlere Anforderung.",
    systeme: [
      { prim:true,  name:"PMBC + Vlies-/Gewebeeinlage",           note:"mind. 4 mm, Gewebeeinlage zwingend an Ecken, Kehlen, Durchdringungen" },
      { prim:false, name:"MDS (Mineralische Dichtungsschlämme)",  note:"Nur bei trockenem Untergrund und geringer Beanspruchung" },
    ],
    checks:[
      "Hohlkehle Wand/Bodenplatte: ∅ 4–6 cm, keine rechten Winkel!",
      "Gewebeeinlage an allen Kehlen und Ecken",
      "Drainageschicht (Noppenbahn + Filtervlies) hinter Abdichtung",
      "Schichtdicke ≥ 4 mm (Nassfilm ≥ 8–10 mm je Lage)",
      "Keine Fehlstellen – visuelle Prüfung nach Trocknung",
    ],
    warnungen:[
      "Drainage und Filterschicht zwingend erforderlich – sonst Rückstau!",
    ],
    norm:"DIN 18533-2:2017, W1.2-E · DIN 18533-1 §4.3",
  };

  if (b === "wand" && w === "W2.1-E") return {
    klasse: "W2.1-E", badge: "badge-mid",
    title: "Wand erdberührt · Drückendes Wasser ≤ 3 m",
    subtitle: "Grundwasserdruck vorhanden. Erhöhte Ausführungsanforderungen.",
    systeme: [

// ═══════════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════════
function navigate(stepKey, optionLabel) {
  // Push current state to stack before moving forward
  navStack.push({
    stepKey: currentStep,
    answers: JSON.parse(JSON.stringify(answers)),
    crumb: optionLabel,
  });
  currentStep = stepKey;
  render();
}

function goBack() {
  if (navStack.length === 0) return;
  const prev = navStack.pop();
  currentStep = prev.stepKey;
  answers = prev.answers;
  render();
}

function reset() {
  navStack = [];
  answers = {};
  currentStep = "bauteil";
  render();
}

let currentStep = "bauteil";

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const bc  = document.getElementById('breadcrumb');

  // Breadcrumb
  bc.innerHTML = navStack.map((h, i) =>
    `<span class="crumb">${h.crumb}</span>${i < navStack.length - 1 ? '<span class="crumb-arrow">›</span>' : ''}`
  ).join('');

  if (currentStep === "result") {
    renderResult(app);
    return;
  }

  const step = TREE[currentStep];
  if (!step) {
    app.innerHTML = `<div class="card"><p style="color:var(--muted)">Unbekannter Schritt: ${currentStep}</p><br><button class="back-btn" onclick="reset()">↩ Neu starten</button></div>`;
    return;
  }

  // Progress
  setProgress(step.progress, `Schritt ${navStack.length + 1} · Wähle eine Option`);

  // Options HTML
  const optsHtml = step.options.map(opt => `
    <button class="opt-btn" onclick="chooseOption(${JSON.stringify(opt).replace(/"/g, '&quot;')})">
      <span class="opt-icon">${opt.icon}</span>
      <span class="opt-text">
        <span class="opt-label">${opt.label}</span>
        ${opt.desc ? `<span class="opt-desc">${opt.desc}</span>` : ''}
      </span>
    </button>
  `).join('');

  app.innerHTML = `
    <div class="card">
      <div class="step-chip"><span class="step-dot"></span>${step.step}</div>
      <div class="question">${step.question}</div>
      ${step.hint ? `<div class="hint">${step.hint}</div>` : '<div style="margin-bottom:16px"></div>'}
      <div class="options">${optsHtml}</div>
      ${navStack.length > 0 ? `<div class="back-row"><button class="back-btn" onclick="goBack()">← Zurück</button></div>` : ''}
    </div>
  `;
}

function chooseOption(opt) {
  // Save this answer
  if (opt.ans !== undefined && opt.ans !== null) {
    answers[currentStep] = opt.ans;
  }
  navigate(opt.next, opt.label);
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER RESULT
// ═══════════════════════════════════════════════════════════════════════════════
function renderResult(app) {
  setProgress(100, "Ergebnis");

  // Merge leitfrage answers into wasser key
  const mergedAnswers = Object.assign({}, answers);
  if (!mergedAnswers.wasser) {
    mergedAnswers.wasser = mergedAnswers.wasser_leitfrage2a || mergedAnswers.wasser_leitfrage2b;
  }

  const r = getResult(mergedAnswers);

  if (!r) {
    app.innerHTML = `
      <div class="card">
        <div class="question" style="color:var(--muted)">Kombination nicht erkannt.</div>
        <div class="hint">Ausgewählte Antworten: ${JSON.stringify(mergedAnswers)}</div>
        <div class="back-row">
          <button class="back-btn" onclick="goBack()">← Zurück</button>
          <button class="back-btn" onclick="reset()" style="margin-left:8px">↩ Neu starten</button>
        </div>
      </div>`;
    return;
  }

  const warnsHtml = r.warnungen.length
    ? `<div class="warn-list">${r.warnungen.map(w => `<div class="warn-box"><span class="wi">⚠️</span><span>${w}</span></div>`).join('')}</div>`
    : '';

  const sysHtml = r.systeme.map(s => `
    <div class="sys-item ${s.prim ? 'prim' : 'alt'}">
      <span class="sys-tag">${s.prim ? 'Empfohlen' : 'Alternativ'}</span>
      <div>
        <div class="sys-name">${s.name}</div>
        <div class="sys-note">${s.note}</div>
      </div>
    </div>`).join('');

  const checksHtml = r.checks.map((c, i) => `
    <div class="check-item">
      <div class="check-box" id="cb${i}" onclick="toggleCheck(${i})"></div>
      <span class="check-label" id="cl${i}" onclick="toggleCheck(${i})">${c}</span>
    </div>`).join('');

  app.innerHTML = `
    <div class="result-wrap">

      <div class="result-hero">
        <div class="badge ${r.badge}">${r.klasse}</div>
        <div class="result-title">${r.title}</div>
        <div class="result-subtitle">${r.subtitle}</div>
      </div>

      ${warnsHtml}

      <div class="section-block">
        <div class="section-head">Abdichtungssystem</div>
        <div class="section-body">${sysHtml}</div>
      </div>

      <div class="section-block">
        <div class="section-head">Ausführungs-Checkliste (Bauleiter)</div>
        <div class="section-body check-list">${checksHtml}</div>
        <div class="norm-row"><span class="norm-icon">📖</span>${r.norm}</div>
      </div>

      <div class="result-footer">
        <button class="back-btn" onclick="goBack()">← Zurück</button>
        <button class="action-btn primary-btn" onclick="reset()">↩ Neue Abfrage</button>
      </div>

    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressPct').textContent = pct + ' %';
}

function toggleCheck(i) {
  const box = document.getElementById('cb' + i);
  const lbl = document.getElementById('cl' + i);
  const on = box.classList.toggle('checked');
  lbl.classList.toggle('checked', on);
}

// ── Init
render();
</script>
